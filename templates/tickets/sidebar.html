<aside class="sidebar">
    <header class="marca">
        <a class="logo-principal logo-sidebar logo-claro" href="{% url 'panel' %}">
            <span class="logo-icono">&#127915;</span>
            <span class="logo-resaltado">Soporte</span>
            <span class="logo-separador">|</span>
            <span class="logo-normal">Tickets</span>
        </a>
    </header>

    <nav class="menu-lateral">
        <a href="{% url 'panel' %}" class="{% if active == 'panel' %}activo{% endif %}">
            <span class="menu-icono">&#127968;</span>
            Dashboard
        </a>
        <a href="{% url 'ticket_list' %}" class="{% if active == 'tickets' %}activo{% endif %}">
            <span class="menu-icono">&#128221;</span>
            Tickets
        </a>
        <a href="{% url 'ticket_create_admin' %}" class="{% if active == 'create' %}activo{% endif %}">
            <span class="menu-icono">&#10133;</span>
            Crear ticket
        </a>
        <a href="{% url 'settings' %}" class="{% if active == 'settings' %}activo{% endif %}">
            <span class="menu-icono">&#9881;</span>
            Configuracion
        </a>
        <form method="post" action="{% url 'logout' %}" class="sidebar-logout">
            {% csrf_token %}
            <button type="submit">
                <span class="menu-icono">&#128682;</span>
                Cerrar sesion
            </button>
        </form>
    </nav>

    <div class="sidebar-usuario">
        <span class="sidebar-avatar">{{ request.user.username|slice:":2"|upper }}</span>
        <div>
            <strong>{{ request.user.get_full_name|default:request.user.username }}</strong>
            <small>{{ request.user.email|default:"Cuenta administrativa" }}</small>
        </div>
    </div>
</aside>
